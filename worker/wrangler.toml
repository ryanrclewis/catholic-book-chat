name = "catholic-book-chat-audio"
main = "index.js"
compatibility_date = "2026-07-01"

# Bind your R2 bucket. Replace bucket_name with your actual bucket name.
[[r2_buckets]]
binding = "PODCAST_BUCKET"
bucket_name = "catholic-book-chat-audio"

# Optional: Configure routing to match custom domain route
[route]
pattern = "catholicbookchat.com/audio/*"
zone_name = "catholicbookchat.com"
